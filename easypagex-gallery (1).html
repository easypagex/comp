<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyPageX · Operational Units</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060608;
    --grid: rgba(255,255,255,0.03);
    --accent-red: #cc2200;
    --accent-green: #00ff66;
    --accent-orange: #ff6600;
    --text-dim: rgba(255,255,255,0.35);
  }
  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  header { text-align: center; margin-bottom: 56px; }
  .eyebrow { font-size: 11px; letter-spacing: 0.35em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
  .site-title { font-family: 'Orbitron', sans-serif; font-size: clamp(22px, 4vw, 38px); font-weight: 900; letter-spacing: 0.08em; color: #fff; }
  .site-title span { color: var(--accent-orange); }
  .divider { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-orange), transparent); margin: 18px auto 0; }
  .gallery { display: flex; gap: 24px; align-items: flex-start; justify-content: center; flex-wrap: wrap; max-width: 1100px; width: 100%; }
  .card { flex: 1 1 280px; max-width: 340px; position: relative; display: block; text-decoration: none; border-radius: 4px; overflow: hidden; outline: 1px solid rgba(255,255,255,0.08); transition: outline-color 0.25s, transform 0.25s; cursor: pointer; background: #0a0a0c; }
  .card:hover { transform: translateY(-6px); }
  .card:nth-child(1):hover { outline-color: var(--accent-red); }
  .card:nth-child(2):hover { outline-color: var(--accent-green); }
  .card:nth-child(3):hover { outline-color: var(--accent-orange); }
  .card img { width: 100%; display: block; object-fit: cover; }
  .card-overlay { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 28px; background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%); opacity: 0; transition: opacity 0.25s; }
  .card:hover .card-overlay { opacity: 1; }
  .card-label { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #fff; padding: 7px 18px; border: 1px solid rgba(255,255,255,0.5); border-radius: 2px; backdrop-filter: blur(4px); }
  .card:nth-child(1) .card-label { border-color: var(--accent-red); color: var(--accent-red); }
  .card:nth-child(2) .card-label { border-color: var(--accent-green); color: var(--accent-green); }
  .card:nth-child(3) .card-label { border-color: var(--accent-orange); color: var(--accent-orange); }
  .card-footer { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.06); }
  .unit-id { font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .unit-status { width: 6px; height: 6px; border-radius: 50%; animation: pulse 2s infinite; }
  .card:nth-child(1) .unit-status { background: var(--accent-red); box-shadow: 0 0 6px var(--accent-red); }
  .card:nth-child(2) .unit-status { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
  .card:nth-child(3) .unit-status { background: var(--accent-orange); box-shadow: 0 0 6px var(--accent-orange); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  footer { margin-top: 56px; text-align: center; font-size: 10px; letter-spacing: 0.25em; color: var(--text-dim); text-transform: uppercase; }
  footer a { color: var(--accent-orange); text-decoration: none; }
  @media (max-width: 680px) { .gallery { flex-direction: column; align-items: center; } .card { max-width: 100%; } }
  @media (prefers-reduced-motion: reduce) { .card { transition: none; } .unit-status { animation: none; } .card-overlay { opacity: 1; } }
</style>
</head>
